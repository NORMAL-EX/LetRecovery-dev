name: Build and Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要构建并发布的分支(留空=用上面 Run workflow 选的分支)"
        required: false
        default: ""
      tag:
        description: "Release 标签(留空=用当天日期,如 2026.6.17)"
        required: false
        default: ""
  # 开发分支：push 即自动构建发布（无需 workflow_dispatch 权限；tag 留空走当天日期）。
  push:
    branches:
      - main
      - refactor/code-quality
      - claude/dazzling-knuth-x9795l

permissions:
  contents: write

concurrency:
  group: build-and-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            正常系统端
            PE端

      - name: Build system-side exe (LetRecovery.exe)
        shell: bash
        working-directory: 正常系统端
        run: |
          set -euo pipefail
          # 有 Cargo.lock 才用 --locked（main 各 crate 自带锁；workspace 分支可能无锁需现生成）
          LOCKED=""
          if [ -f Cargo.lock ] || [ -f ../Cargo.lock ]; then LOCKED="--locked"; fi
          echo "cargo build --release ${LOCKED:-(no --locked)}"
          cargo build --release $LOCKED

      - name: Build PE-side exe (LetRecoveryPE.exe)
        shell: bash
        working-directory: PE端
        run: |
          set -euo pipefail
          LOCKED=""
          if [ -f Cargo.lock ] || [ -f ../Cargo.lock ]; then LOCKED="--locked"; fi
          echo "cargo build --release ${LOCKED:-(no --locked)}"
          cargo build --release $LOCKED

      - name: Download base package (dev base = 上游包 + XP 驱动)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # 底包改用 dev 仓库 `base` release 的 package.7z（由 build-base-package.yml 生成，
          # 已把 XP 驱动并入 bin/drivers/xp）。需先运行一次 build-base-package 生成该底包。
          gh release download base --repo "${{ github.repository }}" --pattern 'package.7z' --dir base
          mv base/package.7z package.7z
          ls -la package.7z

      - name: Extract base package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pkg
          7z x package.7z -opkg -y >/dev/null
          test -f "pkg/LetRecovery.exe"            || { echo "底包缺少 LetRecovery.exe"; exit 1; }
          test -f "pkg/bin/pe/LetRecovery_PE.wim"  || { echo "底包缺少 bin/pe/LetRecovery_PE.wim"; exit 1; }

      - name: Relocate system-side lang/diskpart into bin
        shell: bash
        run: |
          set -euo pipefail
          # 正常系统端新布局：根目录 lang/diskpart 收进 bin/（PE 端在 WIM 内的 lang 不受影响）。
          mkdir -p pkg/bin
          for d in lang diskpart; do
            if [ -d "pkg/$d" ]; then
              mkdir -p "pkg/bin/$d"
              cp -rf "pkg/$d/." "pkg/bin/$d/"
              rm -rf "pkg/$d"
              echo "relocated pkg/$d -> pkg/bin/$d"
            fi
          done

      - name: Replace system-side exe
        shell: bash
        run: |
          set -euo pipefail
          # 产物可能在各 crate 的 target/（独立 crate）或工作区根 target/（workspace）
          src=""
          for p in "正常系统端/target/release/LetRecovery.exe" "target/release/LetRecovery.exe"; do
            if [ -f "$p" ]; then src="$p"; break; fi
          done
          test -n "$src" || { echo "找不到编译产物 LetRecovery.exe"; exit 1; }
          echo "Using system-side exe: $src"
          cp -f "$src" "pkg/LetRecovery.exe"

      - name: Inject PE-side exe into WIM
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wim   = "pkg\bin\pe\LetRecovery_PE.wim"
          $mount = Join-Path $env:RUNNER_TEMP "wimmount"
          New-Item -ItemType Directory -Force -Path $mount | Out-Null
          Write-Host "Mounting $wim ..."
          dism /Mount-Image /ImageFile:"$wim" /Index:1 /MountDir:"$mount"
          if ($LASTEXITCODE -ne 0) { throw "DISM mount failed" }
          $dst = Join-Path $mount "Program Files\LetRecoveryPE\LetRecoveryPE.exe"
          # 产物可能在 crate 的 target\ 或工作区根 target\
          $peExe = @("PE端\target\release\LetRecoveryPE.exe", "target\release\LetRecoveryPE.exe") | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $peExe) { throw "找不到编译产物 LetRecoveryPE.exe" }
          Write-Host "Using PE-side exe: $peExe"
          Copy-Item -Force $peExe $dst
          Write-Host "Replaced: $dst"
          # 多语言文件随 PE exe 注入（PE 端 i18n 从 exe 同级 lang/ 目录加载）
          $langSrc = "assets\release\lang\en-US.json"
          if (Test-Path $langSrc) {
            $langDir = Join-Path $mount "Program Files\LetRecoveryPE\lang"
            New-Item -ItemType Directory -Force -Path $langDir | Out-Null
            Copy-Item -Force $langSrc (Join-Path $langDir "en-US.json")
            Write-Host "Injected PE lang: $langDir\en-US.json"
          }
          dism /Unmount-Image /MountDir:"$mount" /Commit
          if ($LASTEXITCODE -ne 0) { throw "DISM unmount/commit failed" }

      - name: Clean WIM (drop orphaned streams shown as [DELETED])
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wim = "pkg\bin\pe\LetRecovery_PE.wim"
          Write-Host "=== WIM info BEFORE clean ==="
          dism /Get-WimInfo /WimFile:"$wim" /Index:1
          # 挂载提交会在 WIM 内留下被替换文件的旧数据流（7z/Bandizip 显示为 [DELETED]）。
          # /Export-Image 仅复制被引用的数据流到新 WIM，去掉孤立流；并保留映像名称与可启动标记。
          $tmp = "pkg\bin\pe\_LetRecovery_PE.clean.wim"
          if (Test-Path $tmp) { Remove-Item -Force $tmp }
          dism /Export-Image /SourceImageFile:"$wim" /SourceIndex:1 /DestinationImageFile:"$tmp" /Compress:max
          if ($LASTEXITCODE -ne 0) { throw "DISM export failed" }
          Remove-Item -Force $wim
          Move-Item -Force $tmp $wim
          Write-Host "=== WIM info AFTER clean ==="
          dism /Get-WimInfo /WimFile:"$wim" /Index:1

      - name: Update WIM MD5 in config.json
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, os, glob
          pkg = "pkg"
          cfg = os.path.join(pkg, "config.json")
          with open(cfg, "r", encoding="utf-8") as f:
              data = json.load(f)
          def md5_upper(path):
              h = hashlib.md5()
              with open(path, "rb") as fp:
                  for chunk in iter(lambda: fp.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest().upper()
          updated = []
          for entry in data.get("pe_cache", {}).get("pe_list", []):
              fn = entry.get("filename")
              if not fn:
                  continue
              matches = glob.glob(os.path.join(pkg, "**", fn), recursive=True)
              if not matches:
                  raise SystemExit(f"WIM not found in package for config entry: {fn}")
              new = md5_upper(matches[0])
              old = entry.get("md5")
              entry["md5"] = new
              updated.append((fn, old, new, matches[0]))
          if not updated:
              raise SystemExit("No pe_list entries updated; config.json structure unexpected")
          with open(cfg, "w", encoding="utf-8", newline="\n") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write("\n")
          for fn, old, new, p in updated:
              print(f"{fn}: {old} -> {new}  ({p})")
          PY
          echo "--- updated config.json ---"
          cat pkg/config.json

      - name: Add README and CSDN evidence into package
        shell: bash
        run: |
          set -euo pipefail
          # 随包放入说明文件（介绍 LetRecovery + 陈述 CSDN 盗卖事实）与证据截图
          if [ -f assets/release/README.txt ]; then
            cp -f assets/release/README.txt pkg/README.txt
          else
            echo "warning: assets/release/README.txt 不存在（该分支可能未包含），跳过"
          fi
          if ls assets/csdn-evidence/*.png >/dev/null 2>&1; then
            mkdir -p pkg/images
            cp -f assets/csdn-evidence/*.png pkg/images/
          else
            echo "warning: assets/csdn-evidence/*.png 不存在，跳过 images/"
          fi
          echo "--- package README + images ---"
          ls -la pkg/README.txt pkg/images/ 2>/dev/null || true

      - name: Add dev extras (repair_boot.txt + diskpart + enable flag)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pkg/bin pkg/diskpart
          # 可编辑的修复引导脚本（必须随包；删除则回退默认逻辑）
          cp -f assets/release/repair_boot.txt pkg/bin/repair_boot.txt
          # diskpart 脚本目录（含说明；用户把分区脚本放这里）—— 新布局放 bin/diskpart
          if [ -d assets/release/diskpart ]; then mkdir -p pkg/bin/diskpart && cp -rf assets/release/diskpart/. pkg/bin/diskpart/; fi
          # 多语言文件（bin/lang 目录；i18n 运行时优先从这里加载 en-US 等外置语言）
          if [ -d assets/release/lang ]; then
            mkdir -p pkg/bin/lang
            cp -rf assets/release/lang/. pkg/bin/lang/
            echo '--- pkg/bin/lang ---'; ls -la pkg/bin/lang
          fi
          # 用户驱动文件夹（按 Windows 版本）：随包提供目录 + README，供用户放驱动
          # （安装对应版本系统时自动 DISM 离线注入；XP 仍用 bin/drivers/xp 存储驱动机制）
          for v in win7 win8 win10 win11; do
            if [ -d "bin/drivers/$v" ]; then
              mkdir -p "pkg/bin/drivers/$v"
              cp -rf "bin/drivers/$v/." "pkg/bin/drivers/$v/"
            fi
          done
          if [ -f bin/drivers/README.md ]; then cp -f bin/drivers/README.md pkg/bin/drivers/README.md; fi
          # XP 存储驱动（含新增 arch-aware 用户目录 x86/amd64；底包已含 ahci/nvme/usb3）：
          # 以仓库为准覆盖进包，确保文本期驱动集成能读到这些目录。
          if [ -d bin/drivers/xp ]; then
            mkdir -p pkg/bin/drivers/xp
            cp -rf bin/drivers/xp/. pkg/bin/drivers/xp/
          fi
          echo '--- pkg/bin/drivers ---'; ls -R pkg/bin/drivers 2>/dev/null || true
          # XP/2003 i386 文本安装：可选产品密钥目录（放 bin\xp\productkey.txt 即全自动无人值守）
          if [ -d bin/xp ]; then
            mkdir -p pkg/bin/xp
            cp -rf bin/xp/. pkg/bin/xp/
          fi
          echo '--- pkg/bin/xp ---'; ls -R pkg/bin/xp 2>/dev/null || true
          # dev release 默认启用「高级选项」（解锁 Diskpart 脚本 / UEFI 引导选项 / repair_boot.txt，供测试）
          python -c "import json,io; d=json.load(open('pkg/config.json',encoding='utf-8')); d.pop('enable_diskpart_scripts',None); d['enable_advanced_options']=True; io.open('pkg/config.json','w',encoding='utf-8',newline='\n').write(json.dumps(d,ensure_ascii=False,indent=2)+'\n')"
          echo '--- repair_boot.txt ---'; cat pkg/bin/repair_boot.txt
          echo '--- config.json ---'; cat pkg/config.json
          ls -la pkg/diskpart pkg/bin/repair_boot.txt

      - name: Repackage into LetRecovery.7z
        shell: bash
        run: |
          set -euo pipefail
          rm -f LetRecovery.7z
          ( cd pkg && 7z a -t7z -mx=9 -m0=lzma2 -ms=on ../LetRecovery.7z ./* >/dev/null )
          ls -la LetRecovery.7z

      - name: Determine tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = (Get-Date).ToUniversalTime().ToString('yyyy.M.d')
          }
          # 非 main 分支构建：给 tag 加 -pre 后缀，避免覆盖 main 的正式 release
          $br = "${{ inputs.branch || github.ref_name }}"
          if (($br -ne "main") -and ($tag -notlike "*-pre")) { $tag = "$tag-pre" }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Tag: $tag"

      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="$(git rev-parse HEAD)"
          BR="${{ inputs.branch || github.ref_name }}"
          PRE=""
          # 非 main 分支视为测试构建：标记为 prerelease 并注明请勿使用
          {
            if [ "$BR" != "main" ]; then
              PRE="--prerelease"
              printf '%s\n\n' "⚠️ 测试构建，请勿使用 / TEST BUILD — DO NOT USE."
              printf '%s\n\n' "此 release 由非 main 分支（${BR}）构建，仅供测试，可能不稳定。"
            fi
            printf '%s\n' "Automated build from branch ${BR} (commit ${SHA})."

            # ——— 测试反馈名人堂（应本人强烈要求收录并署真名）———
            printf '\n%s\n\n' "---"
            printf '%s\n\n' "## 🏆 测试反馈名人堂 · 首位殿堂级贡献者"
            printf '%s\n\n' "经全体格式化引擎、SMART 数据与控制变量法一致表决，特此隆重收录："
            printf '%s\n\n' "### 王鹏鹏（网名 TiK，**应本人强烈要求署真名** 🙏）"
            printf '%s\n\n' "**毕生事迹：**"
            printf '%s\n' "- 坚持以一块 **¥53 二手扩容假盘**（faspeedK5-120G）外加 **一个 U 盘**作为“专业测试平台”，在其分区表自然损坏成「**78GB FAT16 · 未格式化**」这一物理上不可能存在的形态后，凭惊人毅力，将硬件故障**反复证伪成“软件 bug”**；"
            printf '%s\n' "- 创造性地提出修复方案：**移除“格式化失败即中止”的安全检查**——即“家里着火、烟雾报警器一直响，那就把报警器拆了，这样它就不响了”。🔥🚨🔨"
            printf '%s\n' "- 为搜集“证据”，**挨个私信骚扰 DSI、新起点、liangnijian 等多位同行作者**，反复盘问“你用 diskpart 还是 format”；其中一位答曰“微软的东西都一样”，当场击穿其核心论点，而本人浑然不觉；"
            printf '%s\n' "- 在 diskpart 格式化于**干净虚拟盘上一次通过**后，无缝转移战场，改质疑“单块 GPT+UEFI 盘怎么装系统”，并向 LetRecovery **作者本人**慷慨提供“电脑小白、包教包会”的装机辅导；"
            printf '%s\n\n' "- 被拉黑后注册马甲“无名”重新潜入，于被 AI 行为画像当场识破后，从容认领：“确实是我小号”。"
            printf '%s\n\n' "**特别贡献奖**：以一己之力，为“如何不写一行代码、不花一分钱、仅凭一块假盘，把开源作者逼到把你写进发版纪念”提供了迄今最详实的范本。"
            printf '%s\n' "> 致谢词（援引本人原话）：感谢您的信任与宣传，期待您持续围观本工具的每一个新版本。🫡"
          } > release_notes.md
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag || true
          gh release create "$TAG" LetRecovery.7z \
            --repo "${{ github.repository }}" \
            --target "$SHA" \
            --title "$TAG" \
            --notes-file release_notes.md \
            $PRE
          echo "Released $TAG (prerelease: ${PRE:-no})"
