name: PE Only (test)

# 仅编译 PE 端 exe 并单独发布，便于快速迭代 PE 端（解锁/安装逻辑）测试，
# 不下底包、不编系统端、不注入 WIM、不打整包——几分钟出 exe。
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "要编译的分支(留空=用上面 Run workflow 选的分支)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: pe-only
  cancel-in-progress: false

jobs:
  pe-only:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            PE端
            正常系统端

      - name: Build PE-side exe (LetRecoveryPE.exe)
        shell: bash
        working-directory: PE端
        run: |
          set -euo pipefail
          LOCKED=""
          if [ -f Cargo.lock ] || [ -f ../Cargo.lock ]; then LOCKED="--locked"; fi
          echo "cargo build --release ${LOCKED:-(no --locked)}"
          cargo build --release $LOCKED

      - name: Collect exe
        shell: bash
        run: |
          set -euo pipefail
          # 产物可能在 crate 的 target/ 或工作区根 target/（workspace）
          for p in "PE端/target/release/LetRecoveryPE.exe" "target/release/LetRecoveryPE.exe"; do
            if [ -f "$p" ]; then cp -f "$p" ./LetRecoveryPE.exe; break; fi
          done
          test -f LetRecoveryPE.exe || { echo "找不到 LetRecoveryPE.exe"; exit 1; }
          ls -la LetRecoveryPE.exe

      - name: Publish release (pe-test)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          BR="${{ inputs.branch || github.ref_name }}"
          SHA="$(git rev-parse HEAD)"
          gh release delete "pe-test" --repo "${{ github.repository }}" --yes --cleanup-tag || true
          gh release create "pe-test" LetRecoveryPE.exe \
            --repo "${{ github.repository }}" \
            --target "$SHA" \
            --title "pe-test" \
            --prerelease \
            --notes "⚠️ 仅 PE 端 exe 测试构建，请勿用于正式用途。分支 ${BR}（commit ${SHA}）。"
          echo "Published pe-test (LetRecoveryPE.exe)"
